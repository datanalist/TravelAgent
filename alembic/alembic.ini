[alembic]
# Путь к директории с env.py и versions/ (относительно этого файла)
script_location = %(here)s

# Шаблон для имён файлов миграций
file_template = %%(rev)s_%%(slug)s

# Разрешаем ревизии без нисходящих зависимостей (для линейной истории)
prepend_sys_path = ..

# Уровень логирования при запуске alembic
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
